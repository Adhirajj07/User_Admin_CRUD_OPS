<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account · Request Management System</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="brand">
        <div class="brand-mark">RM</div>
        <div>
          <div class="brand-name">Request Management</div>
          <div class="brand-sub">Internal workflow system</div>
        </div>
      </div>

      <h1>Create your account</h1>
      <p class="subtitle">Register to start submitting requests.</p>

      <form id="register-form" novalidate>
        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" autocomplete="name" required />
          <div class="field-error" id="name-error"></div>
        </div>

        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" autocomplete="email" required />
          <div class="field-error" id="email-error"></div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="new-password" required />
          <div class="password-hint">At least 8 characters</div>
          <div class="field-error" id="password-error"></div>
        </div>

        <div class="field">
          <label for="confirm-password">Confirm password</label>
          <input type="password" id="confirm-password" name="confirmPassword" autocomplete="new-password" required />
          <div class="field-error" id="confirm-password-error"></div>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">
          <span class="spinner"></span>
          <span class="btn-label">Create account</span>
        </button>
      </form>

      <p class="form-footer">
        Already have an account? <a href="/login">Sign in</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
