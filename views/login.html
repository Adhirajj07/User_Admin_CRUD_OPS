<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In · Request Management System</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="brand">
        <div class="brand-mark">RM</div>
        <div>
          <div class="brand-name">Request Management</div>
          <div class="brand-sub">Internal workflow system</div>
        </div>
      </div>

      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to continue.</p>

      <div class="role-toggle" role="tablist" aria-label="Sign in as">
        <button type="button" id="tab-user" class="active" onclick="setRole('user')">User</button>
        <button type="button" id="tab-admin" onclick="setRole('admin')">Admin</button>
      </div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" autocomplete="email" required />
          <div class="field-error" id="email-error"></div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
          <div class="field-error" id="password-error"></div>
        </div>

        <a href="/forgot-password" class="helper-link" id="forgot-link">Forgot password?</a>

        <button type="submit" class="btn btn-primary" id="submit-btn">
          <span class="spinner"></span>
          <span class="btn-label" id="submit-label">Sign in as User</span>
        </button>
      </form>

      <p class="form-footer" id="register-footer">
        Don't have an account? <a href="/register">Create one</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
