<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password · Request Management System</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="brand">
        <div class="brand-mark">RM</div>
        <div>
          <div class="brand-name">Request Management</div>
          <div class="brand-sub">Internal workflow system</div>
        </div>
      </div>

      <div id="form-view">
        <h1>Forgot your password?</h1>
        <p class="subtitle">Enter your email and we'll send you a reset link.</p>

        <form id="forgot-form" novalidate>
          <div class="field">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" autocomplete="email" required />
            <div class="field-error" id="email-error"></div>
          </div>

          <button type="submit" class="btn btn-primary" id="submit-btn">
            <span class="spinner"></span>
            <span class="btn-label">Send reset link</span>
          </button>
        </form>
      </div>

      <div id="success-view" class="hidden">
        <div class="success-box">
          <div class="icon-circle">✓</div>
          <h1>Check your email</h1>
          <p class="subtitle">
            If that email is registered, a reset link is on its way. It expires in 1 hour.
          </p>
        </div>
      </div>

      <p class="form-footer">
        <a href="/login">Back to sign in</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/forgot-password.js"></script>
</body>
</html>
