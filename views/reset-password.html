<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password · Request Management System</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="brand">
        <div class="brand-mark">RM</div>
        <div>
          <div class="brand-name">Request Management</div>
          <div class="brand-sub">Internal workflow system</div>
        </div>
      </div>

      <div id="form-view">
        <h1>Set a new password</h1>
        <p class="subtitle">Choose a new password for your account.</p>

        <form id="reset-form" novalidate>
          <div class="field">
            <label for="password">New password</label>
            <input type="password" id="password" name="password" autocomplete="new-password" required />
            <div class="password-hint">At least 8 characters</div>
            <div class="field-error" id="password-error"></div>
          </div>

          <div class="field">
            <label for="confirm-password">Confirm new password</label>
            <input type="password" id="confirm-password" name="confirmPassword" autocomplete="new-password" required />
            <div class="field-error" id="confirm-password-error"></div>
          </div>

          <button type="submit" class="btn btn-primary" id="submit-btn">
            <span class="spinner"></span>
            <span class="btn-label">Reset password</span>
          </button>
        </form>
      </div>

      <div id="success-view" class="hidden">
        <div class="success-box">
          <div class="icon-circle">✓</div>
          <h1>Password updated</h1>
          <p class="subtitle">You can now sign in with your new password.</p>
          <a href="/login" class="btn btn-primary" style="display:inline-flex;width:auto;padding-left:24px;padding-right:24px;">Go to sign in</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/reset-password.js"></script>
</body>
</html>
