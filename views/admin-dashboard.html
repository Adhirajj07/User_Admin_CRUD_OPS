<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard · Request Management System</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="page-loader" id="page-loader"><div class="spinner"></div></div>

  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">RM</div>
        <div>
          <div class="brand-name">Request Mgmt</div>
          <div class="brand-sub">Admin Dashboard</div>
        </div>
      </div>

      <div class="nav-item active">
        <span>🗂️</span> All Requests
      </div>

      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="user-avatar" id="user-avatar">A</div>
          <div class="user-chip-info">
            <div class="user-chip-name" id="user-name">-</div>
            <div class="user-chip-role">Admin</div>
          </div>
        </div>
        <div class="nav-item" onclick="logout()">
          <span>↩</span> Log out
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <div class="topbar">
        <div style="display:flex; align-items:center; gap:12px;">
          <button class="mobile-nav-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
          <div>
            <h1>All Requests</h1>
            <p class="page-desc">Review, approve, or reject requests from every user.</p>
          </div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">Total requests</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-pending">0</div>
          <div class="stat-label">Pending review</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-approved">0</div>
          <div class="stat-label">Approved</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-rejected">0</div>
          <div class="stat-label">Rejected</div>
        </div>
      </div>

      <div class="toolbar">
        <input type="search" id="search-input" placeholder="Search title, description, category..." />
        <select id="filter-status">
          <option value="">All statuses</option>
          <option value="Pending">Pending</option>
          <option value="Approved">Approved</option>
          <option value="Rejected">Rejected</option>
        </select>
        <select id="sort-order">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
        </select>
        <div class="spacer"></div>
      </div>

      <div class="request-grid" id="request-grid">
        <!-- Request cards injected here -->
      </div>
    </main>
  </div>

  <!-- Reject confirmation modal -->
  <div class="modal-overlay" id="reject-modal">
    <div class="modal-box">
      <h2>Reject this request?</h2>
      <p class="modal-sub">The requester will see it marked as Rejected.</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeRejectModal()">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirm-reject-btn" style="width:auto;">
          <span class="spinner"></span>
          <span class="btn-label">Reject</span>
        </button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/admin-dashboard.js"></script>
</body>
</html>
